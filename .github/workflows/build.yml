name: Build desktop bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bundle:
    name: Bundle ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            tauriArgs: ""
          - name: Windows
            os: windows-latest
            tauriArgs: ""
          - name: macOS Apple Silicon
            os: macos-latest
            tauriArgs: "--target aarch64-apple-darwin"
          - name: macOS Intel
            os: macos-latest
            tauriArgs: "--target x86_64-apple-darwin"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain
        if: matrix.os != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain for macOS
        if: matrix.os == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: x-hosts v__VERSION__
          releaseBody: Automated build created by GitHub Actions.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauriArgs }}
